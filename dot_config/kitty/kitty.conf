# Transparency
background_opacity 0.5
dynamic_background_opacity yes

# Alacritty-like minimal look
hide_window_decorations yes
window_padding_width 8
tab_bar_min_tabs 2
tab_bar_style hidden

# Alacritty doesn't do blinking cursor by default
cursor_blink_interval 0

# Font rendering closer to Alacritty
text_composition_strategy 1.0 0

# Pull in matugen-generated colors (regenerated on wallpaper change)
include dank-theme.conf

# Nushell for shell integration
shell nu

# No sound >:(
enable_audio_bell no
